# EXP-117: orth_only × DomainNet R200 3-seed (对齐 EXP-080 PACS/Office orth_only)
# 目的: 验证 orth_only 在 DomainNet 上是否也超 FDSE R200 (72.21%)
# 算法: feddsa_scheduled mode=0 (orth_only base), 对齐 EXP-080 完全相同超参
algo_para:
- 1.0    # lo (λ_orth, 和 EXP-080 一样 lo=1.0)
- 0.0    # lh (HSIC off)
- 1.0    # ls (unused mode=0)
- 0.2    # tau
- 5      # sdn
- 128    # pd
- 0      # sm = 0 (orth_only base, 不启用 InfoNCE/share/align)
- 60
- 30
- 80
- 10
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
