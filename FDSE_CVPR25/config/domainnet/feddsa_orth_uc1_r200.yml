# EXP-115 DomainNet orth_uc1 R200 3-seed baseline
# 对齐 EXP-109 PACS + EXP-110 Office orth_uc1 config (feddsa_sgpa 算法, lo=1 uw=1 uc=1 ca=0)
# 目的: 把 orth_only 扩展到 DomainNet, 与 FDSE R200 3-seed (72.21) 对比
algo_para:
- 1.0     # lo (lambda_orth)
- 0.1     # te (tau_etf)
- 128     # pd (proj_dim)
- 10      # wr (warmup_rounds)
- 1e-3    # es (eps_sigma)
- 2       # mcw (min_clients_whiten)
- 1       # dg (diag on)
- 0       # ue (use_etf)
- 1       # uw (use_whitening)
- 1       # uc (use_centers)
- 0       # se (save_ckpt)
- 0       # lp (lambda_pull)
- 0       # ca (CDANN off)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
