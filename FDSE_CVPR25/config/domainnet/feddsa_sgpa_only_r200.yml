# EXP-120 分解消融: SGPA + orth only (无 whitening 无 centers)
# 目的: 分解 orth_uc1 (EXP-115) +0.28 增益来源
# vs orth_only (feddsa_scheduled EXP-117) AVG B 72.23: 揭示 SGPA 架构本身贡献
# vs orth_uc1 (EXP-115) AVG B 72.49: 揭示 whitening + centers 贡献
algo_para:
- 1.0     # lo (lambda_orth)
- 0.1     # te (tau_etf, unused when ue=0)
- 128     # pd (proj_dim)
- 10      # wr (warmup_rounds)
- 1e-3    # es (eps_sigma)
- 2       # mcw (min_clients_whiten)
- 1       # dg (diag on)
- 0       # ue (use_etf=0, 用 nn.Linear 分类头)
- 0       # uw (use_whitening=0, 不做 pooled whitening)
- 0       # uc (use_centers=0, 不收集 class centers)
- 0       # se (save_ckpt)
- 0       # lp (lambda_pull)
- 0       # ca (CDANN off)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
