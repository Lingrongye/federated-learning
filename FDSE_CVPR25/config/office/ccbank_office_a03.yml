# EXP-119 Sanity B: CC-Bank on Office, α=0.3 (保守)
algo_para:
- 0.3    # alpha (AdaIN mix strength)
- 0.5    # aug_prob (per-sample augment probability)
- 8      # min_samples (min class count to contribute to bank)
- 0.0    # bank_smoothing (0=overwrite, no smoothing)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
