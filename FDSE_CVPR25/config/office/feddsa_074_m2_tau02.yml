# EXP-074 Office: tau=0.2, mode=2 (M3 domain-aware)
algo_para:
- 1.0    # lambda_orth
- 0.0    # lambda_hsic
- 1.0    # lambda_sem
- 0.2    # tau (fixed from 0.1)
- 50     # warmup_rounds
- 5      # style_dispatch_num
- 128    # proj_dim
- 0.05   # aug_min
- 0.8    # aug_max
- 0.05   # noise_std
- 0.9    # ema_decay
- 2      # adaptive_mode
- 0.5    # fixed_alpha_value
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
