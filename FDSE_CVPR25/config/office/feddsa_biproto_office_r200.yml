# FedDSA-BiProto Office full pipeline R200 (S1 smoke / S2 3-seed)
# Bell schedule: warmup 0-50 / ramp 50-80 / peak 80-150 / ramp-down 150-200
algo_para:
- 1.0    # [0]  lo
- 0.0    # [1]  lh
- 1.0    # [2]  ls legacy
- 0.2    # [3]  tau legacy
- 5      # [4]  sdn
- 128    # [5]  pd
- 0      # [6]  sm
- 60     # [7]  bp
- 30     # [8]  bw
- 80     # [9]  cr
- 10     # [10] gli (open for diagnostics)
- 1.0    # [11] lm
# ---- BiProto ----
- 0.5    # [12] lp  = lambda_sty_proto peak
- 0.3    # [13] le  = lambda_proto_excl peak
- 0.1    # [14] tp
- 0.5    # [15] mc
- 50     # [16] ws  = warmup_start
- 80     # [17] we  = warmup_end
- 150    # [18] rd  = ramp_down
- 0.9    # [19] emd
- 1      # [20] se  = 1 (save best ckpt)
- 0      # [21] fz  = 0 (full training)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
