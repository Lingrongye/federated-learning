# λ_rec 加强 (诊断: decoder 学不出来因为 λ_rec=0.001 太小, 调大 1.0 看效果)
algo_para:
- 1.0    # 0  lambda_rec  (★ 调大 from 0.001)
- 1.0      # 1  lambda_saac
- 0.01     # 2  lambda_dsct
- 0.01     # 3  lambda_kl
- 10       # 4  kl_warmup_rounds
