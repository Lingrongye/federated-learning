# FedDSA-DualEnc Office sanity (5 round 快速验证 - EXP-128 R005)
# 目的: 验证 4 个 loss 都跑得通, GPU 显存够, 风格仓库流转正常, 无 NaN
# algo_para 顺序严格匹配 algorithm/feddsa_dualenc.py Server.initialize()
algo_para:
- 0.001    # 0  lambda_rec
- 1.0      # 1  lambda_saac
- 0.01     # 2  lambda_dsct
- 0.01     # 3  lambda_kl
- 2        # 4  kl_warmup_rounds (sanity 缩短为 2)
- 2        # 5  saac_warmup_rounds (sanity 缩短为 2, 让 round 3 起激活 cycle)
- 512      # 6  sem_dim
- 16       # 7  sty_dim
- 256      # 8  srm_hidden
- 4        # 9  bank_K
- 0.1      # 10 tau
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 5         # sanity 5 round
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
