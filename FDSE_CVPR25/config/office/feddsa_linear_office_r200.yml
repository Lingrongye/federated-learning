# EXP-100 Office R200: Linear 对照 (use_etf=0)
# 保留 SGPA 所有基础设施 (whitening + diag + style_stats), 唯一变量: classifier 换回 nn.Linear
# Goal: 量化 ETF 本身 vs 副作用 的贡献 (控制变量实验)
algo_para:
- 1.0    # lo = lambda_orth
- 0.1    # tau_etf (无效于 use_etf=0, 但保留 yaml 位置一致)
- 128    # pd = proj_dim
- 10     # warmup_r
- 1e-3   # eps_sigma
- 2      # min_clients_whiten
- 1      # diag = ON (便于观察 Linear 下的 etf_align 是否 ~0, 类间分离是否不如 ETF)
- 0      # use_etf = 0 (普通 nn.Linear classifier, 对照)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
