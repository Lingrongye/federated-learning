# EXP-084: Office orth_only LR=0.05 + 方案A (sas=1) + se=1
# 方案 A: 服务器端用风格相似度个性化 semantic_head，Art/Caltech 等 outlier 域获益
algo_para:
- 1.0    # lo
- 0.0    # lh
- 1.0    # ls
- 0.2    # tau
- 5      # sdn
- 128    # pd
- 0      # sm = orth_only (不引入 InfoNCE)
- 60
- 30
- 80
- 10     # gli
- 1.0    # lm
- 0.25   # al
- 1      # se = 1
- 1      # sas = 1, 启用方案 A
- 0.3    # sas_tau = 0.3 (softmax 温度)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 1
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
