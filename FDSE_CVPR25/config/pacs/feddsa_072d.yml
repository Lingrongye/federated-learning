# EXP-072d: M3-only (domain-aware protos, original Beta augmentation)
# adaptive_mode=2 (M3 only)
algo_para:
- 1.0    # lambda_orth
- 0.0    # lambda_hsic
- 1.0    # lambda_sem
- 0.1    # tau
- 50     # warmup_rounds
- 5      # style_dispatch_num
- 128    # proj_dim
- 0.05   # aug_min
- 0.8    # aug_max
- 0.05   # noise_std
- 0.9    # ema_decay
- 2      # adaptive_mode: 2=M3-only
- 0.5    # fixed_alpha_value (unused)
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
