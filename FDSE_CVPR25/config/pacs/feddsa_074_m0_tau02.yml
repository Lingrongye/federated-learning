# EXP-074: tau=0.2 investigation — mode=0 baseline (matching original feddsa_069f tau)
# Goal: Verify if tau=0.2 fixes the R150-170 training collapse in feddsa_adaptive
# adaptive_mode=0 (fixed alpha=0.5), tau=0.2 (was 0.1)
algo_para:
- 1.0    # lambda_orth
- 0.0    # lambda_hsic
- 1.0    # lambda_sem
- 0.2    # tau  ← CHANGED from 0.1 to 0.2 (matching feddsa_069f)
- 50     # warmup_rounds
- 5      # style_dispatch_num
- 128    # proj_dim
- 0.05   # aug_min
- 0.8    # aug_max
- 0.05   # noise_std
- 0.9    # ema_decay
- 0      # adaptive_mode: 0=fixed_alpha
- 0.5    # fixed_alpha_value
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
