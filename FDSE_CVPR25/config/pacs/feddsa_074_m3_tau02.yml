# EXP-074: tau=0.2 investigation — mode=3 M1+M3 full
# Goal: Full adaptive system with stable training (tau=0.2 matching feddsa_069f)
# adaptive_mode=3 (M1+M3), tau=0.2 (was 0.1)
algo_para:
- 1.0    # lambda_orth
- 0.0    # lambda_hsic
- 1.0    # lambda_sem
- 0.2    # tau  ← CHANGED from 0.1 to 0.2 (matching feddsa_069f)
- 50     # warmup_rounds
- 5      # style_dispatch_num
- 128    # proj_dim
- 0.05   # aug_min
- 0.8    # aug_max
- 0.05   # noise_std
- 0.9    # ema_decay
- 3      # adaptive_mode: 3=M1+M3 full
- 0.5    # fixed_alpha_value (unused)
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
