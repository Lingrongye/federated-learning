# EXP-077b: Alpha-Sparsity InfoNCE (FedPLVM-inspired)
# mode=5, alpha=0.25, tau=0.07 (FedPLVM optimal)
# R50 quick validation
algo_para:
- 1.0    # lo: lambda_orth
- 0.0    # lh: lambda_hsic
- 1.0    # ls: lambda_sem
- 0.07   # tau (FedPLVM optimal)
- 5      # sdn: style_dispatch_num
- 128    # pd: proj_dim
- 5      # sm: schedule_mode = 5 (alpha-sparsity)
- 60     # bp: unused
- 30     # bw: unused
- 80     # cr: unused
- 5      # gli: grad_log_interval
- 1.0    # lm: lambda_mse (unused in mode 5)
- 0.25   # al: alpha_sparsity (FedPLVM optimal)
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 50
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
