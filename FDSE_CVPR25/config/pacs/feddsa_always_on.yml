# EXP-076d: Decouple + Always-on InfoNCE (L_orth full from R0, no ramp)
# Equivalent to original FedDSA but with orth properly active from R0
# schedule_mode=3 (always_on)
algo_para:
- 1.0    # lo: lambda_orth (FULL from R0)
- 0.0    # lh: lambda_hsic
- 1.0    # ls: lambda_sem (full weight from R0)
- 0.2    # tau
- 5      # sdn: style_dispatch_num
- 128    # pd: proj_dim
- 3      # sm: schedule_mode = 3 (always_on, no ramp)
- 60     # bp: bell_peak (unused)
- 30     # bw: bell_width (unused)
- 80     # cr: cutoff_round (unused)
- 10     # gli: grad_log_interval
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
