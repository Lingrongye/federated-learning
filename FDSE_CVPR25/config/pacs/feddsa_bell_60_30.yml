# EXP-076b: Decouple + Bell-curve InfoNCE (peak R60, width 30)
# L_orth full from R0; InfoNCE peaks at R60 then decays
# schedule_mode=1 (bell)
algo_para:
- 1.0    # lo: lambda_orth (FULL from R0)
- 0.0    # lh: lambda_hsic
- 1.0    # ls: lambda_sem (base weight, multiplied by bell)
- 0.2    # tau
- 5      # sdn: style_dispatch_num
- 128    # pd: proj_dim
- 1      # sm: schedule_mode = 1 (bell-curve)
- 60     # bp: bell_peak (InfoNCE strongest at R60)
- 30     # bw: bell_width (sigma=30, ~R30-90 active)
- 80     # cr: cutoff_round (unused)
- 10     # gli: grad_log_interval
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
