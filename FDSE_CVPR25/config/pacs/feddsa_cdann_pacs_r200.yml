# EXP-108 PACS CDANN R200: Plan A + whitening + CDANN (dom_head + GRL on z_sem)
# 对照 EXP-098 Linear+whitening (PACS 80.20 -1.49pp vs Plan A): 看 CDANN 是否能回到 ≥82.2
# 参数与 EXP-098 严格对齐 (E=5 PACS 惯例), 加 ca=1
algo_para:
- 1.0    # lo (lambda_orth)
- 0.1    # te (tau_etf, Linear 模式无意义)
- 128    # pd (proj_dim)
- 10     # wr (warmup_rounds for style bank)
- 1e-3   # es (eps_sigma)
- 2      # mcw (min_clients_whiten)
- 1      # dg = 1 (Diagnostic ON, 必须, 用于 domain probe 和 loss_dom_* 监控)
- 0      # ue = 0 (use_etf=0, Linear classifier)
- 1      # uw = 1 (use_whitening=1, 保持与 EXP-098 Linear 对照基础)
- 1      # uc = 1 (use_centers=1, 严格对齐 EXP-098 PACS baseline, 保持最小变动只改 ca)
- 1      # se = 1 (保存 checkpoint 供 frozen probe 使用)
- 0      # lp = 0
- 1      # ca = 1 (CDANN ON)
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
