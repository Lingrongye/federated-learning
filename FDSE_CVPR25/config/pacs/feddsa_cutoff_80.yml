# EXP-076c: Decouple + Cutoff InfoNCE (on until R80, then off)
# L_orth full from R0; InfoNCE active R0-R80, hard off after R80
# schedule_mode=2 (cutoff)
algo_para:
- 1.0    # lo: lambda_orth (FULL from R0)
- 0.0    # lh: lambda_hsic
- 1.0    # ls: lambda_sem
- 0.2    # tau
- 5      # sdn: style_dispatch_num
- 128    # pd: proj_dim
- 2      # sm: schedule_mode = 2 (cutoff)
- 60     # bp: bell_peak (unused)
- 30     # bw: bell_width (unused)
- 80     # cr: cutoff_round (InfoNCE off after R80)
- 10     # gli: grad_log_interval
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
