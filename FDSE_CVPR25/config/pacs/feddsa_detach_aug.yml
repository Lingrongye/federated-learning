# EXP-077d: Detached Augmentation (PARDON-inspired)
# mode=7: aug features go to contrastive (concat with z_sem), NOT to CE
# Uses alpha-sparsity InfoNCE + MSE anchor (both active via use_alpha/use_mse flags)
# R50 quick validation
algo_para:
- 1.0    # lo: lambda_orth
- 0.0    # lh: lambda_hsic
- 1.0    # ls: lambda_sem
- 0.07   # tau
- 5      # sdn: style_dispatch_num
- 128    # pd: proj_dim
- 7      # sm: schedule_mode = 7 (detach aug from CE)
- 60     # bp: unused
- 30     # bw: unused
- 80     # cr: unused
- 5      # gli: grad_log_interval
- 1.0    # lm: lambda_mse
- 0.25   # al: alpha_sparsity
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 50
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
