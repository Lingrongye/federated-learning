# FedDSA-DualEnc PACS λ_rec=0.1 (Office grid 最佳值, 移植到 PACS)
algo_para:
- 0.1      # 0  lambda_rec  ← 比原 0.001 大 100x
- 1.0      # 1  lambda_saac
- 0.01     # 2  lambda_dsct
- 0.01     # 3  lambda_kl
- 10       # 4  kl_warmup_rounds
- 10       # 5  saac_warmup_rounds
- 512      # 6  sem_dim
- 16       # 7  sty_dim
- 256      # 8  srm_hidden
- 4        # 9  bank_K
- 0.1      # 10 tau

num_rounds: 200
num_epochs: 5
batch_size: 50
learning_rate: 0.1
learning_rate_decay: 0.9998
weight_decay: 1.0e-3
proportion: 1.0
seed: 2

model: feddsa_dualenc
