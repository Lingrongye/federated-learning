# EXP-075: Gradual training + deep augmentation (h-space) + M3 domain-aware protos
# Control: same ramp-up but augmentation at h-space (like original FedDSA)
algo_para:
- 1.0    # lo
- 0.0    # lh
- 1.0    # ls
- 0.2    # tau
- 5      # sdn
- 128    # pd
- 15     # tma
- 8      # twa
- 40     # tml
- 10     # twl
- 0      # al: aug_level (0=deep/h-space)
- 10     # gli
learning_rate: 0.1
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
