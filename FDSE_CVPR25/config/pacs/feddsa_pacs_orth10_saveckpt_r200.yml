# EXP-111: PACS 极强正交 lo=10.0 + whitening + se=1 (ca=0, no CDANN)
# 对照 EXP-111 lo=3 看是否继续单调改善.
algo_para:
- 10.0   # lo ★ 极强正交
- 0.1    # te
- 128    # pd
- 10     # wr
- 1e-3   # es
- 2      # mcw
- 1      # dg = 1
- 0      # ue = 0
- 1      # uw = 1
- 1      # uc = 1
- 1      # se = 1
- 0      # lp = 0
- 0      # ca = 0
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
