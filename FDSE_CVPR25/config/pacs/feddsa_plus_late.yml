algo_para:
- 1.0    # lambda_orth
- 0.1    # lambda_hsic
- 1.0    # lambda_sem
- 0.1    # tau
- 80     # stage1_end (round < 80: pure CE, 更晚)
- 150    # stage2_end (80-150: +decouple, >=150: +style+infonce)
- 15     # transition_width (更宽的过渡)
- 1.0    # aux_grad_clip
- 5      # style_dispatch_num
- 128    # proj_dim
learning_rate: 0.1
batch_size: 50
