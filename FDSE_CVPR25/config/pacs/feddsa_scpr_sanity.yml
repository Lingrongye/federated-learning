# EXP-095 SCPR M0 sanity — PACS scpr=2 τ=0.3 R=20
# Quick ~30 min smoke test to catch NaN / starts-up / bank-plumbing issues before full R=200 deploy.
algo_para:
- 1.0    # lo = lambda_orth (Plan A)
- 0.0    # lh = lambda_hsic (Plan A)
- 1.0    # ls = lambda_sem (applies to SCPR loss too)
- 0.2    # tau = InfoNCE temperature (Plan A, used inside SCPR loss)
- 5      # sdn
- 128    # pd
- 0      # sm = orth_only (no legacy InfoNCE; SCPR is sole alignment)
- 60
- 30
- 80
- 10     # gli
- 1.0    # lm
- 0.25   # al
- 1      # se = 1 (save best checkpoint)
- 0      # sas = 0 (SCPR-only, no parameter routing)
- 0.3    # sas_tau (unused when sas=0)
- 2      # scpr = 2 (style-weighted SCPR, OURS)
- 0.3    # scpr_tau = SCPR attention temperature
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 20
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
