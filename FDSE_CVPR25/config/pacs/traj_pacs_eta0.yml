# EXP-119 Sanity C: Trajectory on PACS, η=0 (无预测 baseline, 等效 static prototype alignment)
algo_para:
- 0.0    # eta (no prediction)
- 0.5    # lambda_align
- 0.0    # proto_ema (no smoothing)
- 5      # warmup_rounds
learning_rate: 0.05
batch_size: 50
weight_decay: 1e-3
lr_scheduler: 0
learning_rate_decay: 0.9998
num_rounds: 200
num_epochs: 5
clip_grad: 10
proportion: 1.0
train_holdout: 0.2
local_test: True
no_log_console: True
log_file: True
