experiment:
  id: "EXP-010"
  name: "FDSE in FDSE framework (AlexNet+DSE, from scratch)"
  date: "2026-04-06"
  purpose: "FDSE框架基线：FDSE原论文方法 (FDSE论文报告PACS 83.8%)"

dataset:
  name: "PACS"
  num_clients: 4
  num_classes: 7
  train_holdout: 0.2

model:
  backbone: "AlexNet + DSEConv/DSELinear (FDSE专用架构)"
  pretrained: false

training:
  global_rounds: 500
  local_epochs: 5
  batch_size: 50
  lr: 0.05
  lr_decay: 0.9998
  weight_decay: 1e-3
  clip_grad: 10
  seeds: [2]

method:
  name: "FDSE"
  algo_para: [0.5, 0.5, 0.001]

framework: "FDSE (flgo)"
run_command: |
  cd FDSE_CVPR25 && python run_single.py --task PACS_c4 --algorithm fdse --gpu 0 --config ./config/pacs/fdse.yml --logger PerRunLogger --seed 2
notes: "FDSE用自己的DSEConv/DSELinear改造AlexNet，lr=0.05(比FedAvg的0.1更小)"
